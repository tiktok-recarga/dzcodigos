<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codigos DZ</title>
    <style>
        /* Estilos generales */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fondo con el GIF solicitado */
            background-image: url('https://i.pinimg.com/originals/8c/13/01/8c1301d108a7a4f555d1cb8f0ffb63d5.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7); /* Un poco más oscuro para que resalte sobre el GIF */
            backdrop-filter: blur(8px); /* Efecto de desenfoque en el cristal */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .email-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 25px;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.9);
            outline: none;
        }

        .submit-button {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            transition: transform 0.2s, filter 0.2s;
        }

        .submit-button:active {
            transform: scale(0.96);
        }

        .netflix-button {
            background-color: #E50914;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }

        .disney-button {
            background-color: #0063e5;
            box-shadow: 0 4px 15px rgba(0, 99, 229, 0.4);
        }

        .submit-button:hover {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">DigitalZone TV</h1>
        <form id="emailForm">
            <input type="email" id="email" placeholder="Introduce tu correo" required class="email-input">
            <button type="submit" class="submit-button netflix-button">Obtener código de Netflix</button>
            <button type="submit" class="submit-button disney-button">Obtener código de Disney Plus</button>
        </form>
    </div>

    <script>
        // Script de Redirección original
        document.getElementById("emailForm").addEventListener("submit", function(event) {
            event.preventDefault();

            var email = document.getElementById("email").value;
            var regex = /^([\w\.\+\-]+)@([\w\-]+\.)+[\w\-]{2,7}$/;

            if (regex.test(email)) {
                var username = email.split('@')[0];
                var yopmailUrl = '';

                if (username.includes('+')) {
                    var plusPart = username.split('+')[1];
                    yopmailUrl = 'https://www.yopmail.com/es/?login=' + plusPart;
                } else {
                    yopmailUrl = 'https://www.yopmail.com/es/?login=' + username;
                }

                window.location.href = yopmailUrl;
            } else {
                alert('Por favor ingrese un correo válido.');
            }
        });
    </script>
</body>
</html>
